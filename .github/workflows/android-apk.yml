# Baut die BlitzText-Android-APK in der GitHub-Cloud.
# Läuft bei Änderungen am android/-Ordner oder manuell (Actions -> Run workflow).
# Alle Bau-Werkzeuge (Java, Android-SDK, Gradle) kommen von GitHub-Servern, nichts lokal.
# Signatur: automatischer Debug-Schlüssel (kein fester Schlüssel im Repo, siehe README).
name: BlitzText Android APK

on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

jobs:
  apk-bauen:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Java 17 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: APK bauen
        run: gradle assembleDebug --no-daemon -PbuildNummer=${{ github.run_number }}

      - name: APK als Artefakt bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: blitztext-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
